name: Release

on:
  push:
    branches:
      - main
      - feat/changeset

permissions:
  contents: write
  pull-requests: write
  id-token: write

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
          registry-url: https://registry.npmjs.org
          scope: '@morpho-org'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Update changeset baseBranch for feature branch
        if: github.ref != 'refs/heads/main'
        run: |
          node -e "const fs = require('fs'); const config = JSON.parse(fs.readFileSync('.changeset/config.json', 'utf8')); config.baseBranch = '${{ github.ref_name }}'; fs.writeFileSync('.changeset/config.json', JSON.stringify(config, null, 2));"

      - name: Create changeset automatically if none exists (feature branches only)
        if: github.ref != 'refs/heads/main'
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');
          const changesetDir = '.changeset';
          const files = fs.readdirSync(changesetDir).filter(f => f.endsWith('.md') && f !== 'README.md');
          if (files.length === 0) {
            console.log('No changesets found. Creating automatic patch changeset...');
            const changesetContent = '---\n---\n\n`@morpho-org/consumer-sdk`: patch\n\nAutomatic patch release for testing\n';
            const timestamp = Date.now();
            fs.writeFileSync(path.join(changesetDir, \`auto-\${timestamp}.md\`), changesetContent);
            console.log('Created automatic changeset');
          } else {
            console.log(\`Found \${files.length} changeset(s), skipping auto-creation\`);
          }
          "

      - name: Create Release Pull Request or Publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          # This expects you to have a script called release which does a build for your packages and calls changeset publish
          publish: pnpm release
          version: pnpm version
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Send a Slack notification if a publish happens
        if: steps.changesets.outputs.published == 'true'
        run: echo "A new version of ${GITHUB_REPOSITORY} was published!"