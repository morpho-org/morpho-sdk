name: Release

on:
  push:
    tags:
      - 'v*.*.*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  lint:
    uses: ./.github/workflows/lint.yml

  test:
    uses: ./.github/workflows/test.yml
    secrets:
      MAINNET_RPC_URL: ${{ secrets.MAINNET_RPC_URL }}

  publish:
    needs:
      - lint
      - test

    uses: ./.github/workflows/publish.yml

