name: Debug

on:
  workflow_call:
    secrets:
      MAINNET_RPC_URL:
        required: true

jobs:
  debug:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Print environment
        run: |
          node -v
          pnpm -v
          printenv

      - name: Print MAINNET_RPC_URL
        run: node -e "console.log('MAINNET_RPC_URL:', process.env.MAINNET_RPC_URL)"
        env:
          MAINNET_RPC_URL: ${{ secrets.MAINNET_RPC_URL }}

      - name: Debug with node REPL
        run: node
        if: false # Set to true and edit as needed for manual debugging

      - name: Run your debug script here
        run: echo "Add any debug steps here"
        env:
          MAINNET_RPC_URL: ${{ secrets.MAINNET_RPC_URL }}
